name: Release Simptrack

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 0.1.0). Used only for manual runs.'
        required: true
        default: '0.1.0'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: react/simptrack

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        shell: bash
        working-directory: ${{ github.workspace }}
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            raw="${GITHUB_REF_NAME#v}"
          else
            raw="${{ github.event.inputs.version }}"
            raw="${raw#v}"
          fi
          echo "version=${raw}" >> "$GITHUB_OUTPUT"
          echo "tag=v${raw}" >> "$GITHUB_OUTPUT"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Assemble release folder
        shell: bash
        run: |
          set -euo pipefail

          # The release folder is built from scratch every run so leftover files
          # from a previous build cannot leak into the zip.
          rm -rf release
          mkdir -p release/Simptrack

          # 1. Built frontend — only the contents of dist/ go into Simptrack/.
          if [ ! -d dist ]; then
            echo "::error::dist/ is missing — did 'bun run build' fail?" >&2
            exit 1
          fi
          cp -R dist/. release/Simptrack/

          # 2. Backend (PHP entry points + helpers + config). Use rsync so we
          #    can explicitly exclude files that must never ship in a release.
          rsync -a \
            --exclude='*.md' \
            --exclude='logs/' \
            --exclude='cache/' \
            --exclude='.DS_Store' \
            --exclude='Thumbs.db' \
            src/backend/ release/Simptrack/

          # 3. Final safety net at the top level of Simptrack/.
          find release/Simptrack -maxdepth 1 -type f -iname '*.md' -delete

          echo "---- release/Simptrack contents ----"
          find release/Simptrack -maxdepth 2 | sort

      - name: Create zip
        shell: bash
        run: |
          set -euo pipefail
          cd release
          # -r recursive, -X strip extra file attributes (smaller, reproducible).
          # Only the 'Simptrack' folder is added, so the zip root contains
          # exactly one entry: Simptrack/.
          zip -r -X "Simptrack-v${{ steps.version.outputs.version }}.zip" Simptrack

          echo "---- zip contents ----"
          unzip -l "Simptrack-v${{ steps.version.outputs.version }}.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Simptrack v${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
          files: react/simptrack/release/Simptrack-v${{ steps.version.outputs.version }}.zip
          body: |
            ## Installation

            Download **`Simptrack-v${{ steps.version.outputs.version }}.zip`** below
            and unzip it into your JobRouter widgets folder:

            ```
            <jobrouter>/dashboard/MyWidgets/
            ```

            Inside the zip you will find a single top-level folder named
            `Simptrack/`, containing the built frontend (the contents of `dist/`)
            and the PHP backend (the contents of `src/backend/`) — nothing else.

            > Ignore the auto-generated **"Source code (zip)"** / **"Source code (tar.gz)"**
            > assets — GitHub attaches those to every release and they contain the
            > full repository, not the deployable widget.

            See [README.md](https://github.com/${{ github.repository }}/blob/${{ steps.version.outputs.tag }}/react/simptrack/README.md)
            for configuration and update instructions.
